name: Build ShadowRealm 3D

on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libglfw3-dev libgl1-mesa-dev pkg-config

      - name: Download GLM and ImGui
        run: |
          git clone --depth 1 https://github.com/g-truc/glm.git glm_tmp
          mkdir -p glm && mv glm_tmp/glm glm/glm && rm -rf glm_tmp

          git clone --depth 1 https://github.com/ocornut/imgui.git imgui_tmp
          mkdir -p imgui/backends
          cp imgui_tmp/imgui*.{h,cpp} imgui/
          cp imgui_tmp/backends/imgui_impl_opengl3.* imgui/backends/
          cp imgui_tmp/backends/imgui_impl_glfw.* imgui/backends/
          rm -rf imgui_tmp

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j4

      - uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-linux
          path: build/shadowrealm
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install glfw cmake

      - name: Download GLM and ImGui
        run: |
          git clone --depth 1 https://github.com/g-truc/glm.git glm_tmp
          mkdir -p glm && mv glm_tmp/glm glm/glm && rm -rf glm_tmp

          git clone --depth 1 https://github.com/ocornut/imgui.git imgui_tmp
          mkdir -p imgui/backends
          cp imgui_tmp/imgui*.{h,cpp} imgui/
          cp imgui_tmp/backends/imgui_impl_opengl3.* imgui/backends/
          cp imgui_tmp/backends/imgui_impl_glfw.* imgui/backends/
          rm -rf imgui_tmp

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j4

      - uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-macos
          path: build/shadowrealm
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download GLM and ImGui
        shell: bash
        run: |
          git clone --depth 1 https://github.com/g-truc/glm.git glm_tmp
          mkdir -p glm && mv glm_tmp/glm glm/glm && rm -rf glm_tmp

          git clone --depth 1 https://github.com/ocornut/imgui.git imgui_tmp
          mkdir -p imgui/backends
          cp imgui_tmp/imgui*.{h,cpp} imgui/
          cp imgui_tmp/backends/imgui_impl_opengl3.* imgui/backends/
          cp imgui_tmp/backends/imgui_impl_glfw.* imgui/backends/
          rm -rf imgui_tmp

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022"

      - name: Build
        run: cmake --build build --config Release -j4

      - uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-windows
          path: build/Release/shadowrealm.exe
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Download GLM
        run: |
          git clone --depth 1 https://github.com/g-truc/glm.git glm_tmp
          mkdir -p glm && mv glm_tmp/glm glm/glm && rm -rf glm_tmp

      - name: Build
        run: |
          cmake -S . -B build-android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build-android -j4

      - uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-android
          path: build-android/libshadowrealm.so
          retention-days: 30