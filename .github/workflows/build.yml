name: Build ShadowRealm 3D

on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libglfw3-dev libglm-dev libx11-dev pkg-config

      - name: Download GLM and ImGui
        run: |
          git clone --depth 1 https://github.com/g-truc/glm.git glm_tmp
          mkdir -p glm && mv glm_tmp/glm glm/glm && rm -rf glm_tmp

          git clone --depth 1 https://github.com/ocornut/imgui.git imgui_tmp
          mkdir -p imgui/backends
          cp imgui_tmp/imgui*.{h,cpp} imgui/ 2>/dev/null || true
          rm -rf imgui_tmp

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j4

      - uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-linux
          path: build/shadowrealm
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake glfw

      - name: Download GLM and ImGui
        run: |
          git clone --depth 1 https://github.com/g-truc/glm.git glm_tmp
          mkdir -p glm && mv glm_tmp/glm glm/glm && rm -rf glm_tmp

          git clone --depth 1 https://github.com/ocornut/imgui.git imgui_tmp
          mkdir -p imgui/backends
          cp imgui_tmp/imgui*.{h,cpp} imgui/ 2>/dev/null || true
          rm -rf imgui_tmp

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j4

      - uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-macos
          path: build/shadowrealm
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download GLM and ImGui
        shell: bash
        run: |
          git clone --depth 1 https://github.com/g-truc/glm.git glm_tmp
          mkdir -p glm && mv glm_tmp/glm glm/glm && rm -rf glm_tmp

          git clone --depth 1 https://github.com/ocornut/imgui.git imgui_tmp
          mkdir -p imgui/backends
          cp imgui_tmp/imgui*.{h,cpp} imgui/ 2>/dev/null || true
          rm -rf imgui_tmp

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022"

      - name: Build
        run: cmake --build build --config Release

      - uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-windows
          path: build/Release/shadowrealm.exe
          retention-days: 30
