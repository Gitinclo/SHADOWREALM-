name: Build ShadowRealm 3D

on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglfw3-dev libglm-dev libgl1-mesa-dev pkg-config
      
      - name: Setup
        run: |
          chmod +x setup.sh
          ./setup.sh
      
      - name: Build
        run: |
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j4
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-linux
          path: build/shadowrealm
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install glfw glm cmake
      
      - name: Setup
        run: |
          chmod +x setup.sh
          ./setup.sh
      
      - name: Build
        run: |
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j4
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-macos
          path: build/shadowrealm
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install CMake
        run: choco install cmake -y
      
      - name: Setup
        shell: bash
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022"
      
      - name: Build
        run: |
          cd build
          cmake --build . --config Release
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-windows
          path: build/Release/shadowrealm.exe
          retention-days: 30
