name: Build ShadowRealm 3D

on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
            - name: Install Python dependencies
        run: pip install jinja2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Add this block right before your build step
      - name: Install Python dependencies for Glad
        run: pip install jinja2

      - name: Build
        run: |
          mkdir build
          cd build
          cmake ..
          make -j4
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # This pulls your code into the runner

      - name: Setup
        run: |
          chmod +x setup.sh
          ./setup.sh
      - name: Setup
        run: |
          chmod +x scripts/setup.sh
          ./scripts/setup.sh

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libglfw3-dev libglm-dev libgl1-mesa-dev pkg-config
      
      - name: Download external libraries
        run: |
          mkdir -p glm include/glad imgui/backends
          
          # Download GLM
          if [ ! -d "glm/glm" ]; then
            git clone --depth 1 https://github.com/g-truc/glm.git glm_temp
            mv glm_temp/glm glm/glm
            rm -rf glm_temp
          fi
          
          # Download ImGui
          if [ ! -f "imgui/imgui.h" ]; then
            git clone --depth 1 https://github.com/ocornut/imgui.git imgui_temp
            mv imgui_temp/* imgui/
            rm -rf imgui_temp
          fi
          
          # Download GLAD
          if [ ! -f "include/glad/gl.h" ]; then
            curl -s https://glad.dav1d.de/generated/glad/core/gl_core_33.h -o include/glad/gl.h || echo "GLAD download failed"
          fi
      
      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
      
      - name: Build
        run: |
          cd build
          make -j4
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-linux
          path: build/shadowrealm
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          brew install glfw glm cmake
      
      - name: Download external libraries
        run: |
          mkdir -p glm include/glad imgui/backends
          
          # Download GLM
          if [ ! -d "glm/glm" ]; then
            git clone --depth 1 https://github.com/g-truc/glm.git glm_temp
            mv glm_temp/glm glm/glm
            rm -rf glm_temp
          fi
          
          # Download ImGui
          if [ ! -f "imgui/imgui.h" ]; then
            git clone --depth 1 https://github.com/ocornut/imgui.git imgui_temp
            mv imgui_temp/* imgui/
            rm -rf imgui_temp
          fi
          
          # Download GLAD
          if [ ! -f "include/glad/gl.h" ]; then
            curl -s https://glad.dav1d.de/generated/glad/core/gl_core_33.h -o include/glad/gl.h || echo "GLAD download failed"
          fi
      
      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
      
      - name: Build
        run: |
          cd build
          make -j4
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-macos
          path: build/shadowrealm
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install CMake
        run: choco install cmake -y
      
      - name: Download external libraries
        shell: bash
        run: |
          mkdir -p build glm include/glad imgui/backends
          
          # Download GLM
          if [ ! -d "glm/glm" ]; then
            echo "Downloading GLM..."
            git clone --depth 1 https://github.com/g-truc/glm.git glm_temp
            mv glm_temp/glm glm/glm
            rm -rf glm_temp
          fi
          
          # Download ImGui
          if [ ! -f "imgui/imgui.h" ]; then
            echo "Downloading ImGui..."
            git clone --depth 1 https://github.com/ocornut/imgui.git imgui_temp
            if [ -d "imgui_temp" ]; then
              cp imgui_temp/imgui.* imgui/ 2>/dev/null || true
              cp imgui_temp/imgui_draw.cpp imgui/ 2>/dev/null || true
              cp imgui_temp/imgui_tables.cpp imgui/ 2>/dev/null || true
              cp imgui_temp/imgui_widgets.cpp imgui/ 2>/dev/null || true
              mkdir -p imgui/backends
              cp imgui_temp/backends/imgui_impl_opengl3.* imgui/backends/ 2>/dev/null || true
              rm -rf imgui_temp
            fi
          fi
          
          # Download GLAD
          if [ ! -f "include/glad/gl.h" ]; then
            echo "Downloading GLAD..."
            curl -s https://glad.dav1d.de/generated/glad/core/gl_core_33.h -o include/glad/gl.h || echo "GLAD download failed"
          fi
      
      - name: Configure with CMake
        shell: bash
        run: |
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -G "Visual Studio 17 2022"
      
      - name: Build
        shell: bash
        run: |
          cd build
          cmake --build . --config Release
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadowrealm-windows
          path: build/Release/shadowrealm.exe
          retention-days: 30
# - name: Setup MSVC
  uses: ilammy/msvc-dev-cmd@v1   # Add this step before cmake

- name: Configure
  run: cmake .. -DCMAKE_BUILD_TYPE=Release -G "Ninja"
# - name: Fix GLAD header
  run: |
    pip3 install glad
    glad --out-path /tmp/glad_out --api gl:core=3.3 c
    cp /tmp/glad_out/include/glad/gl.h include/glad/gl.h
    cp /tmp/glad_out/src/gl.c src/glad.c
# - name: Install glad dependencies
  run: python3 -m pip install --upgrade jinja2
